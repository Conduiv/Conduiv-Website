<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Conduiv — Technology conducive to growth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff5ed"/>
      <stop offset="60%" stop-color="#ffe7d3"/>
      <stop offset="100%" stop-color="#ffc8a1"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A33"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a33" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff7a33" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="980" cy="120" r="260" fill="url(#orb)"/>
  <circle cx="120" cy="560" r="220" fill="url(#orb)" opacity="0.8"/>

  <!-- Logo mark -->
  <g transform="translate(96, 120)">
    <rect width="120" height="120" rx="28" fill="url(#mark)"/>
    <path d="M88 36 A32 32 0 1 0 88 84" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M64 48 L80 60 L64 72" stroke="white" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Brand wordmark -->
  <g font-family="'Plus Jakarta Sans', system-ui, sans-serif" fill="#14130f">
    <text x="240" y="210" font-size="96" font-weight="800" letter-spacing="-3">Conduiv<tspan fill="#EA580C">.</tspan></text>
    <text x="240" y="260" font-size="26" font-weight="600" fill="#6c6c66" letter-spacing="2">BILAL GHOUS · IT CONSULTING · TORONTO</text>
  </g>

  <!-- Headline -->
  <g font-family="'Plus Jakarta Sans', system-ui, sans-serif" fill="#14130f">
    <text x="96" y="380" font-size="58" font-weight="800" letter-spacing="-2">
      Microsoft estates that <tspan fill="#EA580C">cost less</tspan>
    </text>
    <text x="96" y="452" font-size="58" font-weight="800" letter-spacing="-2">
      and <tspan fill="#EA580C">move faster</tspan>.
    </text>
  </g>

  <!-- Metric pills -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700">
    <g transform="translate(96, 500)">
      <rect width="230" height="62" rx="31" fill="#ffffff" stroke="#ffc8a1" stroke-width="2"/>
      <text x="30" y="40" font-size="26" fill="#EA580C">$150K+</text>
      <text x="118" y="40" font-size="16" fill="#6c6c66" font-weight="500" font-family="'Plus Jakarta Sans', sans-serif">Azure saved</text>
    </g>
    <g transform="translate(346, 500)">
      <rect width="210" height="62" rx="31" fill="#ffffff" stroke="#ffc8a1" stroke-width="2"/>
      <text x="30" y="40" font-size="26" fill="#EA580C">50%</text>
      <text x="90" y="40" font-size="16" fill="#6c6c66" font-weight="500" font-family="'Plus Jakarta Sans', sans-serif">faster onboard</text>
    </g>
    <g transform="translate(576, 500)">
      <rect width="210" height="62" rx="31" fill="#ffffff" stroke="#ffc8a1" stroke-width="2"/>
      <text x="30" y="40" font-size="26" fill="#EA580C">99.9%</text>
      <text x="105" y="40" font-size="16" fill="#6c6c66" font-weight="500" font-family="'Plus Jakarta Sans', sans-serif">uptime</text>
    </g>
    <g transform="translate(806, 500)">
      <rect width="290" height="62" rx="31" fill="#ffffff" stroke="#ffc8a1" stroke-width="2"/>
      <text x="30" y="40" font-size="26" fill="#EA580C">15,000+</text>
      <text x="148" y="40" font-size="16" fill="#6c6c66" font-weight="500" font-family="'Plus Jakarta Sans', sans-serif">users supported</text>
    </g>
  </g>

  <!-- Domain mark -->
  <text x="1104" y="120" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="600" fill="#EA580C" text-anchor="end">conduiv.com</text>
</svg>
